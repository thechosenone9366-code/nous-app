name: 🏗️ Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Install Expo CLI & EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: 🏗️ Setup Expo project
        run: npx expo install --check
        continue-on-error: true

      - name: 🤖 Build APK with Gradle (local build)
        run: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📱 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nous-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 🎉 Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Nous App v${{ github.run_number }}"
          body: |
            ## 💕 Nous App - Build automatique

            ### Télécharger l'APK
            Téléchargez le fichier `nous-app-release.apk` ci-dessous et installez-le sur votre Android.

            > ⚠️ Activez "Sources inconnues" dans les paramètres Android avant d'installer.
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
